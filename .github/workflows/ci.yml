name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. PHP syntax lint ─────────────────────────────────────────────────────
  lint:
    name: PHP ${{ matrix.php }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: none

      - name: Lint all PHP files
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            if ! php -l "$file" > /dev/null 2>&1; then
              php -l "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.php' -not -path './.git/*' -print0)
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS PHP file(s) failed syntax check"
            exit 1
          fi
          echo "All PHP files passed syntax check"

      - name: Check XML well-formedness
        run: |
          ERRORS=0
          for f in version.xml emailTemplates.xml plugin-gallery.xml; do
            result=$(php -r "
              libxml_use_internal_errors(true);
              \$doc = new DOMDocument();
              \$doc->loadXML(file_get_contents('$f'));
              \$errs = libxml_get_errors();
              libxml_clear_errors();
              // Ignore DTD-not-found errors (expected outside OJS tree)
              \$real = array_filter(\$errs, fn(\$e) => \$e->code !== 4 && strpos(\$e->message, 'DTD') === false);
              if (!empty(\$real)) {
                foreach (\$real as \$e) { echo trim(\$e->message).PHP_EOL; }
                exit(1);
              }
              echo 'ok';
            " 2>&1)
            if [ "$result" != "ok" ]; then
              echo "::error file=$f::XML error: $result"
              ERRORS=$((ERRORS + 1))
            else
              echo "OK: $f"
            fi
          done
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Check for BOM markers
        run: |
          ERRORS=0
          while IFS= read -r -d '' file; do
            if LC_ALL=C grep -qP '^\xEF\xBB\xBF' "$file"; then
              echo "::error file=$file::BOM marker found"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . \( -name '*.php' -o -name '*.xml' -o -name '*.po' \) -not -path './.git/*' -print0)
          [ "$ERRORS" -eq 0 ] || exit 1
          echo "No BOM markers found"

  # ── 2. Locale completeness ─────────────────────────────────────────────────
  locale:
    name: Locale completeness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: none

      - name: All template keys present and no empty translations
        run: php tests/locale-check.php

  # ── 3. Token security tests ────────────────────────────────────────────────
  token:
    name: Token security tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: none

      - name: Token format validation
        run: php tests/token-format.php

      - name: No eval / shell_exec / system calls in plugin code
        run: |
          ERRORS=0
          BANNED='eval\s*\(|shell_exec\s*\(|system\s*\(|passthru\s*\(|popen\s*\(|proc_open\s*\('
          while IFS= read -r -d '' file; do
            if grep -qP "$BANNED" "$file"; then
              echo "::error file=$file::Banned function call found"
              grep -nP "$BANNED" "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.php' -not -path './.git/*' -print0)
          [ "$ERRORS" -eq 0 ] || exit 1
          echo "No banned function calls found"

      - name: No raw SQL string concatenation
        run: |
          # Flag SQL built by concatenating user-supplied variables (basic check)
          # Legitimate DB::table() calls are fine; we look for "SELECT.*\$_"
          ERRORS=0
          while IFS= read -r -d '' file; do
            if grep -qP '(SELECT|INSERT|UPDATE|DELETE).*\$_(GET|POST|REQUEST|COOKIE|SERVER)' "$file"; then
              echo "::error file=$file::Possible raw SQL injection via superglobal"
              grep -nP '(SELECT|INSERT|UPDATE|DELETE).*\$_(GET|POST|REQUEST|COOKIE|SERVER)' "$file"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find . -name '*.php' -not -path './.git/*' -print0)
          [ "$ERRORS" -eq 0 ] || exit 1
          echo "No obvious SQL injection patterns found"
